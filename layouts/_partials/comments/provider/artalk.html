{{- with .Site.Params.comments.artalk -}}
{{- $style := resources.Get "scss/partials/comments/artalk.scss" | toCSS | minify -}}
<link rel="stylesheet" href="https://testingcf.jsdelivr.net/npm/artalk@2/dist/Artalk.css">
<link rel="stylesheet" href="{{ $style.RelPermalink }}">

<div id="Comments" class="artalk-container"></div>

<script src="https://testingcf.jsdelivr.net/npm/artalk@2/dist/Artalk.js"></script>
<script>
    (function() {
        function getArtalkDarkMode() {
            return document.documentElement.dataset.scheme === 'dark';
        }

        const commentsContainer = document.getElementById('Comments');
        if (!commentsContainer) return;
        if (commentsContainer.dataset.artalkLoaded === 'true') return;

        if (typeof Artalk === 'undefined') {
            console.error('Artalk script not loaded.');
            return;
        }

        const artalkInstance = Artalk.init({
            el: '#Comments',
            pageKey: '{{ $.RelPermalink }}',
            pageTitle: '{{ $.Title }}',
            server: '{{ .serverUrl }}',
            site: '{{ .site }}',
            darkMode: getArtalkDarkMode(),
            locale: 'auto',
        });

        commentsContainer.dataset.artalkLoaded = 'true';

        window.addEventListener('onColorSchemeChange', (e) => {
            if (!artalkInstance || typeof artalkInstance.setDarkMode !== 'function') return;
            artalkInstance.setDarkMode(e.detail === 'dark');
        });
    })();
</script>
{{- end -}}
